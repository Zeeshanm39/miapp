
name: miapp
description: "A new Flutter project."

publish_to: 'none' # Prevents accidental publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.6.0
  cupertino_icons: ^1.0.8
  video_player: ^2.8.2
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  intl: ^0.18.1
  firebase_analytics: 11.6.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/MILogo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/